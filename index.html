<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game 24 - Arcade Space</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <!-- Confetti library for winning/solution effect -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script> -->
    <script src="confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Particle Canvas -->
    <canvas id="particles-js"></canvas>

    <!-- Custom Modal -->
    <div class="modal-overlay" id="solution-modal">
      <div class="modal-box">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-title" data-i18n="modal_title">✨ เฉลย ✨</div>
        <div class="modal-content" id="modal-text"></div>
        <button class="modal-btn" onclick="closeModal()" data-i18n="modal_ok">
          ตกลง
        </button>
      </div>
    </div>

    <div class="box">
      <button
        class="settings-btn"
        onclick="toggleSettings()"
        title="ตั้งค่าระบบ"
        data-i18n-attr="title:title_settings"
      >
        ⚙️
      </button>
      <!-- <img src="logo.png" alt="โลโก้เกม 24" class="main-logo"> -->
      <div class="title" data-i18n="title_main">🎯 เกม 24</div>

      <div class="label" style="margin-top: 0" data-i18n="label_numbers">
        ชุดตัวเลข
      </div>
      <div class="slot-container" id="slots">
        <div class="slot">-</div>
        <div class="slot">-</div>
        <div class="slot">-</div>
        <div class="slot">-</div>
      </div>

      <div class="label" data-i18n="label_target">เป้าหมาย</div>
      <div class="answer-box" id="answer">?</div>

      <div style="margin: 30px 0">
        <button id="btn-generate" onclick="generate()" data-i18n="btn_generate">
          🎰 สุ่มโจทย์
        </button>
        <button
          id="btn-solution"
          onclick="showSolution()"
          data-i18n="btn_solution"
        >
          💡 ดูเฉลย
        </button>
      </div>

      <div id="settings-panel" class="settings-panel">
        <div class="settings-tabs">
          <button
            class="tab-btn active"
            onclick="switchTab(event, 'game')"
            data-i18n="tab_game"
          >
            เกม
          </button>
          <button
            class="tab-btn"
            onclick="switchTab(event, 'audio')"
            data-i18n="tab_audio"
          >
            ระบบเสียง
          </button>
          <button
            class="tab-btn"
            onclick="switchTab(event, 'credit')"
            data-i18n="tab_credit"
          >
            เครดิต
          </button>
        </div>

        <div id="tab-game" class="tab-content active">
          <div class="config-row" style="margin-bottom: 15px">
            <div
              style="
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
              "
            >
              <span data-i18n="setting_lang">ภาษา:</span>
              <select id="lang">
                <option value="th">ไทย</option>
                <option value="en">English</option>
              </select>
            </div>
          </div>
          <div class="config-row" style="margin-bottom: 15px">
            <div
              style="
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
              "
            >
              <span data-i18n="setting_count">จำนวนตัวเลข:</span>
              <select id="count">
                <option value="4" data-i18n="opt_4_items">4 ตัว</option>
                <option value="5" data-i18n="opt_5_items">5 ตัว</option>
              </select>
            </div>
          </div>
          <div class="config-row" style="margin-bottom: 15px">
            <div
              style="
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
              "
            >
              <span data-i18n="setting_digits">จำนวนหลัก:</span>
              <select id="digits">
                <option value="2" data-i18n="opt_2_digits">2 หลัก</option>
                <option value="3" data-i18n="opt_3_digits">3 หลัก</option>
              </select>
            </div>
          </div>

          <div class="label" style="margin-top: 15px" data-i18n="setting_ops">
            เครื่องหมายที่ใช้ได้
          </div>
          <div class="ops">
            <label class="toggle-btn" style="--btn-color: #00ffff">
              <input type="checkbox" value="+" checked />
              <span class="btn-text" data-i18n="op_add">บวก (+)</span>
            </label>
            <label class="toggle-btn" style="--btn-color: #ffaa00">
              <input type="checkbox" value="-" checked />
              <span class="btn-text" data-i18n="op_sub">ลบ (-)</span>
            </label>
            <label class="toggle-btn" style="--btn-color: #ff00cc">
              <input type="checkbox" value="*" checked />
              <span class="btn-text" data-i18n="op_mul">คูณ (*)</span>
            </label>
            <label class="toggle-btn" style="--btn-color: #00ff00">
              <input type="checkbox" value="/" checked />
              <span class="btn-text" data-i18n="op_div">หาร (/)</span>
            </label>
            <label class="toggle-btn" style="--btn-color: #ffffff">
              <input type="checkbox" value="^" />
              <span class="btn-text" data-i18n="op_pow">ยกกำลัง (^)</span>
            </label>
          </div>
        </div>

        <div id="tab-audio" class="tab-content" style="display: none">
          <div
            class="config-row audio-row"
            style="flex-direction: column; align-items: stretch"
          >
            <div
              style="
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 10px;
              "
            >
              <span data-i18n="setting_bgm">เพลงประกอบ (BGM)</span>
              <span id="vol-bgm-text" style="color: #00ffff; font-weight: bold"
                >50%</span
              >
            </div>
            <input
              type="range"
              id="vol-bgm"
              class="vol-slider"
              min="0"
              max="1"
              step="0.05"
              value="0.5"
              oninput="updateVolBGM()"
            />
          </div>

          <div
            class="config-row audio-row"
            style="flex-direction: column; align-items: stretch"
          >
            <div
              style="
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 10px;
              "
            >
              <span data-i18n="setting_sfx">เสียงเอฟเฟกต์ (SFX)</span>
              <span id="vol-sfx-text" style="color: #00ffff; font-weight: bold"
                >50%</span
              >
            </div>
            <input
              type="range"
              id="vol-sfx"
              class="vol-slider"
              min="0"
              max="1"
              step="0.05"
              value="0.5"
              oninput="updateVolSFX()"
            />
          </div>
          <!-- Hidden audio element for BG music -->
          <audio id="audio-bgm" src="bgm.mp3" loop autoplay></audio>
        </div>

        <div id="tab-credit" class="tab-content" style="display: none">
          <div
            style="
              font-size: 14px;
              line-height: 1.6;
              text-align: left;
              background: rgba(0, 0, 0, 0.3);
              padding: 15px;
              border-radius: 12px;
              border: 1px solid rgba(255, 255, 255, 0.1);
              margin-bottom: 15px;
            "
          >
            <span data-i18n="credit_dev" style="color: #ccc">ผู้พัฒนา:</span>
            <br />
            <a
              href="https://github.com/nawa-dev"
              target="_blank"
              style="
                color: #00ffff;
                text-decoration: none;
                font-weight: bold;
                font-size: 16px;
              "
              >@nawa-dev</a
            >
          </div>
          <div
            style="
              font-size: 14px;
              line-height: 1.6;
              text-align: left;
              background: rgba(0, 0, 0, 0.3);
              padding: 15px;
              border-radius: 12px;
              border: 1px solid rgba(255, 255, 255, 0.1);
            "
          >
            <span data-i18n="credit_sfx" style="color: #ccc"
              >เสียงเอฟเฟกต์:</span
            >
            <br />
            by
            <a
              href="https://pixabay.com/users/freesound_community-46691455/?utm_source=link-attribution&amp;utm_medium=referral&amp;utm_campaign=music&amp;utm_content=69233"
              target="_blank"
              style="color: #00ffff; text-decoration: none"
              >freesound_community</a
            >
            from
            <a
              href="https://pixabay.com/sound-effects//?utm_source=link-attribution&amp;utm_medium=referral&amp;utm_campaign=music&amp;utm_content=69233"
              target="_blank"
              style="color: #00ffff; text-decoration: none"
              >Pixabay</a
            >
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
