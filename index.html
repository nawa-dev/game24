<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>เกม 24</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Confetti library for winning/solution effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
      body {
        font-family: "Mitr", sans-serif;
        text-align: center;
        background: radial-gradient(circle at center, #2b1055 0%, #000000 100%);
        color: #fff;
        margin: 0;
        overflow-x: hidden;
        overflow-y: auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 0;
        box-sizing: border-box;
      }
      #particles-js {
        position: fixed;
        width: 100%;
        height: 100%;
        z-index: 1;
        top: 0;
        left: 0;
        pointer-events: none;
      }
      .box {
        margin: auto; /* Allow vertical centering but prevent top-cutoff on overflow */
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        padding: 30px 20px;
        width: 90%;
        max-width: 400px;
        box-sizing: border-box;
        border-radius: 20px;
        box-shadow:
          0 0 20px rgba(0, 255, 255, 0.2),
          inset 0 0 10px rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(0, 255, 255, 0.3);
        position: relative;
        z-index: 10;
      }
      .main-logo {
        width: auto;
        height: 80px;
        margin: 0 auto 10px auto;
        display: block;
        filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.6));
        animation: floatLogo 3s ease-in-out infinite;
      }
      @keyframes floatLogo {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
      }
      .title {
        font-size: 32px;
        margin-bottom: 20px;
        font-weight: 600;
        color: #00ffff;
        text-shadow:
          0 0 10px #00ffff,
          0 0 20px #00ffff,
          0 0 40px #00ffff;
        letter-spacing: 2px;
      }
      button {
        padding: 12px 20px;
        margin: 5px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(45deg, #ff00cc, #3333ff);
        color: white;
        font-size: 16px;
        font-family: "Mitr", sans-serif;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 15px rgba(255, 0, 204, 0.4);
      }
      button:hover {
        transform: scale(1.05) translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 0, 204, 0.6);
      }
      button:active {
        transform: scale(0.95);
      }
      button:disabled {
        background: #555;
        box-shadow: none;
        cursor: not-allowed;
        transform: none;
      }
      select {
        padding: 6px;
        margin: 5px 0;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        border: 1px solid #00ffff;
        font-family: "Mitr", sans-serif;
        outline: none;
      }
      .label {
        margin-top: 15px;
        font-weight: 600;
        color: #ffaa00;
        text-shadow: 0 0 5px #ffaa00;
      }
      /* Slot machine styles */
      .slot-container {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin: 10px 0 15px 0;
        min-height: 70px;
        flex-wrap: wrap;
      }
      .slot {
        width: 45px;
        height: 65px;
        background: linear-gradient(
          to bottom,
          #e0e0e0 0%,
          #ffffff 50%,
          #e0e0e0 100%
        );
        color: #111;
        font-size: 34px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        border: 3px solid #ffcc00;
        box-shadow:
          inset 0 5px 15px rgba(0, 0, 0, 0.6),
          0 0 10px #ffcc00;
        text-shadow: 1px 1px 0px #fff;
        transition: transform 0.1s;
      }
      .slot.rolling {
        filter: blur(1.5px);
        color: #555;
        background: linear-gradient(
          to bottom,
          #cfcfcf 0%,
          #eeeeee 50%,
          #cfcfcf 100%
        );
      }
      .answer-box {
        font-size: 42px;
        font-weight: bold;
        margin: 10px 0 15px 0;
        color: #00ff00;
        text-shadow:
          0 0 15px #00ff00,
          0 0 30px #00ff00;
        height: 50px;
      }
      .ops {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 5px;
      }

      /* Toggle Buttons for Operators */
      .toggle-btn {
        cursor: pointer;
        background: rgba(255, 255, 255, 0.05);
        padding: 8px 12px;
        border-radius: 8px;
        border: 2px solid #555;
        transition: all 0.3s ease;
        user-select: none;
        display: inline-block;
        color: #666;
      }
      .toggle-btn input[type="checkbox"] {
        display: none;
      }
      .toggle-btn .btn-text {
        font-weight: bold;
        transition: all 0.3s ease;
        filter: grayscale(100%);
        opacity: 0.5;
      }
      .toggle-btn input[type="checkbox"]:checked + .btn-text {
        color: var(--btn-color);
        text-shadow: 0 0 8px var(--btn-color);
        filter: none;
        opacity: 1;
      }
      /* Using :has to style the parent label when checked */
      @supports selector(:has(div)) {
        .toggle-btn:has(input[type="checkbox"]:checked) {
          border-color: var(--btn-color);
          background: rgba(255, 255, 255, 0.15);
          box-shadow: 0 0 8px var(--btn-color);
        }
      }

      /* Config row styling */
      .config-row {
        display: flex;
        justify-content: space-between;
        padding: 0 10px;
        font-size: 14px;
      }

      /* Settings Panel Styles */
      .settings-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 18px;
        cursor: pointer;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
        z-index: 20;
        box-shadow: none;
        padding: 0;
        margin: 0;
      }
      .settings-btn:hover {
        transform: rotate(90deg) scale(1.1);
        background: rgba(255, 255, 255, 0.2);
      }
      .settings-panel {
        display: none;
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px dashed rgba(255, 255, 255, 0.2);
        animation: slideDown 0.3s ease-out;
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Sweet Modal Styles */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(5px);
        z-index: 100;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.3s forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .modal-box {
        background: linear-gradient(135deg, #1e0b36, #3b1b60);
        padding: 30px;
        border-radius: 20px;
        border: 2px solid #00ffff;
        box-shadow:
          0 0 20px rgba(0, 255, 255, 0.5),
          inset 0 0 10px rgba(255, 255, 255, 0.1);
        text-align: center;
        width: 320px;
        transform: scale(0.8);
        animation: popIn 0.3s forwards;
        position: relative;
        max-width: 90%;
      }
      @keyframes popIn {
        to {
          transform: scale(1);
        }
      }
      .modal-title {
        font-size: 26px;
        color: #ff00cc;
        margin-bottom: 15px;
        text-shadow: 0 0 10px #ff00cc;
        font-weight: 600;
      }
      .modal-content {
        font-size: 32px;
        font-weight: bold;
        color: #00ff00;
        text-shadow: 0 0 10px #00ff00;
        margin-bottom: 20px;
        word-break: break-all;
      }
      .modal-close {
        background: transparent;
        border: none;
        color: #999;
        font-size: 28px;
        position: absolute;
        top: 5px;
        right: 15px;
        cursor: pointer;
        box-shadow: none;
        padding: 0;
        margin: 0;
        transition: all 0.2s;
      }
      .modal-close:hover {
        color: white;
        transform: scale(1.2);
        background: transparent;
        box-shadow: none;
      }
      .modal-btn {
        width: 100%;
        margin: 10px 0 0 0;
      }
    </style>
  </head>
  <body>
    <!-- Particle Canvas -->
    <canvas id="particles-js"></canvas>

    <!-- Custom Modal -->
    <div class="modal-overlay" id="solution-modal">
      <div class="modal-box">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-title">✨ เฉลย ✨</div>
        <div class="modal-content" id="modal-text"></div>
        <button class="modal-btn" onclick="closeModal()">ตกลง</button>
      </div>
    </div>

    <div class="box">
      <button
        class="settings-btn"
        onclick="toggleSettings()"
        title="ตั้งค่าระบบ"
      >
        ⚙️
      </button>
      <!-- <img src="logo.png" alt="โลโก้เกม 24" class="main-logo"> -->
      <div class="title">🎯 เกม 24</div>

      <div class="label" style="margin-top: 0">ชุดตัวเลข</div>
      <div class="slot-container" id="slots">
        <div class="slot">-</div>
        <div class="slot">-</div>
        <div class="slot">-</div>
        <div class="slot">-</div>
      </div>

      <div class="label">เป้าหมาย</div>
      <div class="answer-box" id="answer">?</div>

      <div style="margin: 15px 0">
        <button id="btn-generate" onclick="generate()">🎰 สุ่มโจทย์</button>
        <button id="btn-solution" onclick="showSolution()">💡 ดูเฉลย</button>
      </div>

      <div id="settings-panel" class="settings-panel">
        <div class="config-row">
          <div>
            จำนวนตัวเลข:
            <br />
            <select id="count">
              <option value="4">4 ตัว</option>
              <option value="5">5 ตัว</option>
            </select>
          </div>
          <div>
            จำนวนหลัก:
            <br />
            <select id="digits">
              <option value="2">2 หลัก</option>
              <option value="3">3 หลัก</option>
            </select>
          </div>
        </div>

        <div class="label" style="margin-top: 15px">เครื่องหมายที่ใช้ได้</div>
        <div class="ops">
          <label class="toggle-btn" style="--btn-color: #00ffff">
            <input type="checkbox" value="+" checked />
            <span class="btn-text">บวก (+)</span>
          </label>
          <label class="toggle-btn" style="--btn-color: #ffaa00">
            <input type="checkbox" value="-" checked />
            <span class="btn-text">ลบ (-)</span>
          </label>
          <label class="toggle-btn" style="--btn-color: #ff00cc">
            <input type="checkbox" value="*" checked />
            <span class="btn-text">คูณ (*)</span>
          </label>
          <label class="toggle-btn" style="--btn-color: #00ff00">
            <input type="checkbox" value="/" checked />
            <span class="btn-text">หาร (/)</span>
          </label>
          <label class="toggle-btn" style="--btn-color: #ffffff">
            <input type="checkbox" value="^" />
            <span class="btn-text">ยกกำลัง (^)</span>
          </label>
        </div>
      </div>
    </div>

    <script>
      // --- Background Particle Animation ---
      const canvas = document.getElementById("particles-js");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let particlesArray;

      class Particle {
        constructor(x, y, directionX, directionY, size, color) {
          this.x = x;
          this.y = y;
          this.directionX = directionX;
          this.directionY = directionY;
          this.size = size;
          this.color = color;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
          ctx.fillStyle = this.color;
          ctx.shadowBlur = 10;
          ctx.shadowColor = this.color;
          ctx.fill();
        }
        update() {
          if (this.x > canvas.width || this.x < 0) {
            this.directionX = -this.directionX;
          }
          if (this.y > canvas.height || this.y < 0) {
            this.directionY = -this.directionY;
          }
          this.x += this.directionX;
          this.y += this.directionY;
          this.draw();
        }
      }

      function initParticles() {
        particlesArray = [];
        let numberOfParticles = (canvas.height * canvas.width) / 9000;
        for (let i = 0; i < numberOfParticles; i++) {
          let size = Math.random() * 3 + 1;
          let x = Math.random() * (innerWidth - size * 2 - size * 2) + size * 2;
          let y =
            Math.random() * (innerHeight - size * 2 - size * 2) + size * 2;
          let directionX = Math.random() * 1.5 - 0.75;
          let directionY = Math.random() * 1.5 - 0.75;
          let color = Math.random() > 0.5 ? "#00ffff" : "#ff00cc";
          particlesArray.push(
            new Particle(x, y, directionX, directionY, size, color),
          );
        }
      }

      function animateParticles() {
        requestAnimationFrame(animateParticles);
        ctx.clearRect(0, 0, innerWidth, innerHeight);
        for (let i = 0; i < particlesArray.length; i++) {
          particlesArray[i].update();
        }
      }
      initParticles();
      animateParticles();

      window.addEventListener("resize", function () {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
        initParticles();
      });

      // --- Game Logic ---
      function toggleSettings() {
        const panel = document.getElementById("settings-panel");
        panel.style.display =
          panel.style.display === "block" ? "none" : "block";
      }

      function randomNums(n) {
        let arr = [];
        for (let i = 0; i < n; i++) arr.push(Math.floor(Math.random() * 9) + 1);
        return arr;
      }

      function getSelectedOps() {
        let checkboxes = document.querySelectorAll(".ops input:checked");
        return Array.from(checkboxes).map((cb) => cb.value);
      }

      function applyOp(a, b, op) {
        if (op === "+") return a + b;
        if (op === "-") return a - b;
        if (op === "*") return a * b;
        if (op === "/") return b !== 0 ? a / b : null;
        if (op === "^") return Math.pow(a, b);
        return null;
      }

      function solveExact(nums, target) {
        let opsSelected = getSelectedOps(); // ดึงค่านอกลูปซ้อนเพื่อเพิ่มประสิทธิภาพไม่ให้ค้าง
        let initialArr = nums.map((n) => ({ val: n, expr: String(n) }));

        function helper(arr) {
          if (arr.length === 1) {
            if (Math.abs(arr[0].val - target) < 1e-6) return arr[0].expr;
            return null;
          }
          for (let i = 0; i < arr.length; i++) {
            for (let j = 0; j < arr.length; j++) {
              if (i === j) continue;
              let rest = [];
              for (let k = 0; k < arr.length; k++)
                if (k !== i && k !== j) rest.push(arr[k]);

              for (let op of opsSelected) {
                if (
                  op === "^" &&
                  (Math.abs(arr[i].val) > 20 || Math.abs(arr[j].val) > 10)
                )
                  continue;

                let r = applyOp(arr[i].val, arr[j].val, op);
                if (r === null || !isFinite(r) || isNaN(r)) continue;

                let next = rest.concat([
                  { val: r, expr: `(${arr[i].expr} ${op} ${arr[j].expr})` },
                ]);
                let res = helper(next);
                if (res !== null) return res;
              }
            }
          }
          return null;
        }
        return helper(initialArr);
      }

      async function spinSlots(nums, targetNumber) {
        const container = document.getElementById("slots");
        const targetEl = document.getElementById("answer");
        container.innerHTML = ""; // ล้างของเดิม

        // สร้างช่อง slot ใหม่ตามจำนวนที่สุ่มได้
        let slotElements = [];
        for (let i = 0; i < nums.length; i++) {
          let el = document.createElement("div");
          el.className = "slot rolling";
          el.innerText = Math.floor(Math.random() * 9) + 1;
          container.appendChild(el);
          slotElements.push(el);
        }

        const intervalTime = 40; // ความเร็วในการเปลี่ยนตัวเลข
        const baseSteps = 15; // จำนวนรอบขั้นต่ำในการหมุนของช่องแรก
        const staggerSteps = 10; // ระยะห่างจำนวนรอบของแต่ละช่อง
        const maxSteps = baseSteps + (nums.length - 1) * staggerSteps;
        const targetStopStep = maxSteps - 5; // หยุดเลขเป้าหมายก่อนเลขสุดท้ายเล็กน้อย

        return new Promise((resolve) => {
          let currentStep = 0;

          let timer = setInterval(() => {
            currentStep++;

            // แอนิเมชันสำหรับตัวเลขเป้าหมาย
            if (currentStep < targetStopStep) {
              targetEl.innerText = Math.floor(Math.random() * 90) + 10;
              targetEl.style.filter = "blur(1.5px)";
              targetEl.style.color = "#555";
              targetEl.style.textShadow = "none";
            } else if (currentStep === targetStopStep) {
              targetEl.innerText = targetNumber;
              targetEl.style.filter = "none";
              targetEl.style.color = "#00ff00";
              targetEl.style.textShadow = "0 0 15px #00ff00, 0 0 30px #00ff00";
              targetEl.style.transform = "scale(1.3)";
              setTimeout(() => (targetEl.style.transform = "scale(1)"), 150);
            }

            slotElements.forEach((el, index) => {
              // ให้ slot หยุดทีละตัว จากซ้ายไปขวา เรียงคลื่น
              const stopStep = baseSteps + index * staggerSteps;

              if (currentStep < stopStep) {
                el.innerText = Math.floor(Math.random() * 9) + 1;
              } else if (currentStep === stopStep) {
                // เมื่อถึงจังหวะหยุด ให้แสดงค่าจริงและลบความเบลอออก
                el.innerText = nums[index];
                el.classList.remove("rolling");
                el.style.transform = "scale(1.2)";
                el.style.boxShadow =
                  "0 0 20px #ffcc00, inset 0 5px 15px rgba(0,0,0,0.6)";

                // เด้งเอฟเฟกต์ยุบกลับ
                setTimeout(() => {
                  el.style.transform = "scale(1)";
                  el.style.boxShadow =
                    "inset 0 5px 15px rgba(0,0,0,0.6), 0 0 10px #ffcc00";
                }, 150);
              }
            });

            if (currentStep >= maxSteps) {
              clearInterval(timer);
              resolve();
            }
          }, intervalTime);
        });
      }

      async function generate() {
        const btnGen = document.getElementById("btn-generate");
        const btnSol = document.getElementById("btn-solution");

        window._lastSolution = null;
        let count = parseInt(document.getElementById("count").value);
        let digits = parseInt(document.getElementById("digits").value);
        let opsSelected = getSelectedOps();

        if (opsSelected.length === 0) {
          alert("กรุณาเลือกอย่างน้อย 1 เครื่องหมาย");
          return;
        }

        let min = Math.pow(10, digits - 1);
        let max = Math.pow(10, digits) - 1;
        let target = Math.floor(Math.random() * (max - min + 1)) + min;

        let nums, solution;
        let attempts = 0;

        // ปิดปุ่มระหว่างค้นหาและแอนิเมชันรัน
        btnGen.disabled = true;
        btnSol.disabled = true;
        document.getElementById("answer").innerText = "...";

        // ค้นหาโจทย์ที่ถูกต้อง
        do {
          if (attempts > 3000) {
            alert(
              "ไม่พบโจทย์ที่เหมาะสม กรุณากดสุ่มใหม่อีกครั้ง หรือปรับลดเงื่อนไขความยาก",
            );
            btnGen.disabled = false;
            btnSol.disabled = false;
            document.getElementById("answer").innerText = "?";
            return;
          }
          if (attempts % 20 === 0) {
            target = Math.floor(Math.random() * (max - min + 1)) + min;
          }
          nums = randomNums(count);
          solution = solveExact(nums, target);
          attempts++;
        } while (solution === null);

        window._lastSolution = solution;

        // เรียกใช้ Effect การหมุน Slot (UI จะรอจนหมุนเสร็จ) พร้อมแสดงเลขเป้าหมาย
        await spinSlots(nums, target);

        btnGen.disabled = false;
        btnSol.disabled = false;
      }

      // ===== Tests =====
      function runTests() {
        console.log("Running tests...");
        console.assert(randomNums(5).length === 5, "randomNums failed");
        let ops = getSelectedOps();
        console.assert(Array.isArray(ops), "getSelectedOps failed");
        console.assert(applyOp(2, 3, "+") === 5, "applyOp + failed");
        console.assert(applyOp(2, 3, "*") === 6, "applyOp * failed");
        console.log("Tests done");
      }
      runTests();

      function closeModal() {
        document.getElementById("solution-modal").style.display = "none";
      }

      function showSolution() {
        if (
          window._lastSolution === null ||
          window._lastSolution === undefined
        ) {
          document.getElementById("modal-text").innerHTML =
            '<span style="color:#ffaa00; font-size:20px;">ยังไม่มีเฉลย กรุณาสุ่มก่อน</span>';
          document.getElementById("solution-modal").style.display = "flex";
        } else {
          // ยิง Party Confetti ออกมาฉลอง!
          if (typeof confetti === "function") {
            confetti({
              particleCount: 150,
              spread: 80,
              origin: { y: 0.6 },
              colors: ["#00ffff", "#ff00cc", "#ffcc00", "#00ff00"],
              zIndex: 200, // Ensure confetti is placed above the modal
            });
          }
          let answer = document.getElementById("answer").innerText;
          document.getElementById("modal-text").innerHTML =
            window._lastSolution + "<br>= " + answer;
          document.getElementById("solution-modal").style.display = "flex";
        }
      }
    </script>
  </body>
</html>
